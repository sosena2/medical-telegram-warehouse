version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw data loaded from the Telegram data lake"
    tables:
      - name: telegram_messages
        description: "Raw Telegram messages from Ethiopian medical channels"
        columns:
          - name: id
            description: "Auto-incremented surrogate key"
          - name: message_id
            description: "Original Telegram message ID"
          - name: channel_name
            description: "Name of the Telegram channel"
          - name: message_date
            description: "Timestamp when message was posted"
          - name: message_text
            description: "Full text of the message"
          - name: has_media
            description: "Whether the message contains media"
          - name: image_path
            description: "Local path to downloaded image"
          - name: views
            description: "Number of views"
          - name: forwards
            description: "Number of times forwarded"

      - name: yolo_detections
        description: "YOLO object detection results from scraped images"
        columns:
          - name: id
            description: "Auto-incremented surrogate key"
          - name: message_id
            description: "Telegram message ID the image belongs to"
          - name: channel_name
            description: "Name of the Telegram channel"
          - name: image_path
            description: "Local path to the detected image"
          - name: detected_class
            description: "Object class detected by YOLO (e.g. person, bottle)"
          - name: confidence_score
            description: "YOLO detection confidence score (0 to 1)"
          - name: image_category
            description: "Classified category: promotional, product_display, lifestyle, or other"
          - name: detected_at
            description: "Timestamp when detection was run"