version: 2

models:
  - name: dim_channels
    description: "Channel dimension with metadata and stats"
    columns:
      - name: channel_key
        description: "Surrogate key (MD5 hash of channel name)"
        data_tests:
          - unique
          - not_null
      - name: channel_name
        data_tests:
          - unique
          - not_null
      - name: channel_type
        data_tests:
          - not_null

  - name: dim_dates
    description: "Date dimension derived from message dates"
    columns:
      - name: date_key
        data_tests:
          - unique
          - not_null
      - name: full_date
        data_tests:
          - unique
          - not_null

  - name: fct_messages
    description: "Fact table — one row per Telegram message"
    columns:
      - name: message_key
        data_tests:
          - unique
          - not_null
      - name: channel_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
      - name: date_key
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key